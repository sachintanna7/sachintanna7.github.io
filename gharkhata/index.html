<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GharKhata">
<meta name="theme-color" content="#2D5C8F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>GharKhata</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Gujarati:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&family=Noto+Sans+Kannada:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap');
  :root{
    --bg:#F2F5F9; --surface:#FFFFFF; --surface2:#F8FAFC; --ink:#22314A; --muted:#7C8899;
    --line:#DFE5EC; --pri:#2D5C8F; --priDeep:#1E4269; --accent:#F5B841;
    --amber:#DD9A3C; --red:#C75B4A; --green:#2E8B57;
  }
  [data-theme="dark"]{
    --bg:#16191C; --surface:#20242A; --surface2:#262B31; --ink:#EEF1F0; --muted:#8B949C;
    --line:#31373E; --pri:#4CAF7D; --priDeep:#398760; --accent:#F2C94C;
    --amber:#D99A3D; --red:#E06555; --green:#4CAF7D;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Inter',sans-serif; background:var(--bg); color:var(--ink); overflow-x:hidden;}
  #app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}
  .header{background:linear-gradient(135deg,var(--pri),var(--priDeep)); padding:calc(env(safe-area-inset-top) + 16px) 20px 14px;}
  .brandRow{display:flex; align-items:center; gap:9px;}
  .mark{width:28px; height:28px; border-radius:9px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:15px;}
  .brand{font-family:'Sora'; font-weight:700; font-size:21px; color:#fff; letter-spacing:-.5px;}
  .syncDot{width:7px; height:7px; border-radius:50%; background:#7ED9A8; margin-left:4px;}
  .syncDot.off{background:rgba(255,255,255,.3);}
  .gear{margin-left:auto; background:none; border:none; color:rgba(255,255,255,.9); font-size:20px; cursor:pointer; padding:4px;}
  .tagline{font-size:11.5px; color:rgba(255,255,255,.85); margin-top:3px;}
  .body{flex:1; overflow-y:auto; padding:18px; padding-bottom:82px;}
  .tabbar{position:fixed; bottom:0; left:0; right:0; max-width:520px; margin:0 auto; background:var(--surface); border-top:1px solid var(--line); display:flex; padding:6px 0 calc(env(safe-area-inset-bottom) + 6px);}
  .tabbtn{flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; cursor:pointer; color:var(--muted); font-family:'Inter'; font-size:11px; font-weight:600;}
  .tabbtn.on{color:var(--pri);}
  .tabbtn svg{width:22px; height:22px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:13px; margin-top:11px;}
  .totCard{background:var(--surface2); border:1px solid var(--line); border-radius:16px; padding:16px;}
  .totLabel{font-size:11px; color:var(--muted); letter-spacing:.6px;}
  .totVal{font-family:'Sora'; font-weight:700; font-size:30px; color:var(--pri); margin-top:3px;}
  .totSub{font-size:11.5px; color:var(--muted); margin-top:4px;}
  .cardTop{display:flex; align-items:center; gap:11px;}
  .emoji{font-size:22px;}
  .vName{font-weight:600; font-size:14px; color:var(--ink);}
  .vMeta{font-size:11.5px; color:var(--muted); margin-top:2px;}
  .dots{margin-left:auto; background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; padding:4px;}
  .stepRow{display:flex; align-items:center; justify-content:space-between; margin-top:12px;}
  .stepper{display:flex; align-items:center; gap:8px;}
  .stepBtn{width:38px; height:38px; border-radius:10px; background:var(--surface2); border:1px solid var(--line); color:var(--pri); font-size:20px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .halfBtn{width:42px; color:var(--amber); font-size:13px;}
  .stepVal{min-width:92px; text-align:center; font-weight:600; font-size:14px;}
  .stepVal.zero{color:var(--muted);}
  .skipBtn{padding:8px 12px; border-radius:9px; border:1px solid var(--line); background:none; color:var(--muted); font-size:12px; font-weight:500; cursor:pointer;}
  .pausedRow{display:flex; align-items:center; gap:7px; margin-top:10px; background:var(--surface2); border-radius:9px; padding:9px; color:var(--amber); font-size:12px; font-weight:500; cursor:pointer; border:none; width:100%;}
  .addBtn{display:flex; align-items:center; justify-content:center; gap:7px; border:1.5px dashed var(--line); border-radius:12px; padding:13px; margin-top:14px; background:none; color:var(--pri); font-size:13px; font-weight:600; cursor:pointer; width:100%;}
  .markRow{display:flex; gap:8px; margin-top:12px;}
  .markBtn{flex:1; padding:10px 0; border-radius:10px; border:1.5px solid var(--line); background:none; font-size:12.5px; font-weight:600; color:var(--muted); cursor:pointer;}
  .salRow{display:flex; gap:8px; margin-top:12px;}
  .salItem{flex:1; background:var(--surface2); border-radius:10px; padding:10px;}
  .salLabel{font-size:10px; color:var(--muted);}
  .salVal{font-weight:600; font-size:13.5px; color:var(--ink); margin-top:3px;}
  .advBtn{display:flex; align-items:center; justify-content:center; gap:6px; margin-top:11px; padding:10px; border-radius:10px; border:1px solid var(--line); background:none; color:var(--pri); font-size:12.5px; font-weight:600; cursor:pointer; width:100%;}
  .toggle{display:flex; gap:6px; background:var(--surface); border-radius:11px; padding:4px; border:1px solid var(--line); margin-bottom:14px;}
  .tBtn{flex:1; padding:9px 0; border-radius:8px; text-align:center; font-weight:600; font-size:13px; color:var(--muted); background:none; border:none; cursor:pointer;}
  .tBtn.on{background:var(--pri); color:#fff;}
  .grandCard{background:var(--surface2); border:1px solid var(--line); border-radius:16px; padding:18px; text-align:center;}
  .grandVal{font-family:'Sora'; font-weight:700; font-size:36px; color:var(--pri); margin-top:4px; letter-spacing:-1px;}
  .section{font-weight:600; font-size:14px; color:var(--ink); margin-top:22px; margin-bottom:10px;}
  .row{display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .rowName{font-weight:500; font-size:13.5px; color:var(--ink);}
  .rowSub{font-size:10.5px; color:var(--muted); margin-top:2px;}
  .rowVal{font-weight:600; font-size:14px; color:var(--ink);}
  .waBtn{display:flex; align-items:center; justify-content:center; gap:9px; background:#25D366; border:none; border-radius:12px; padding:14px; margin-top:22px; color:#fff; font-size:14.5px; font-weight:600; cursor:pointer; width:100%;}
  .upiBtn{display:flex; align-items:center; justify-content:center; gap:8px; border:1.5px solid var(--pri); border-radius:12px; padding:13px; margin-top:11px; background:none; color:var(--pri); font-size:14px; font-weight:600; cursor:pointer; width:100%;}
  .empty{padding:20px; background:var(--surface2); border-radius:14px; margin-top:8px; text-align:center; font-size:13px; color:var(--muted); line-height:19px;}
  /* expenses */
  .filterRow{display:flex; gap:7px; overflow-x:auto; padding:2px 0 10px; margin-bottom:2px;}
  .filterRow::-webkit-scrollbar{display:none;}
  .fchip{flex-shrink:0; padding:7px 12px; border-radius:20px; border:1.5px solid var(--line); background:var(--surface); font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; white-space:nowrap;}
  .fchip.on{border-color:var(--pri); background:var(--pri); color:#fff;}
  .expRow{display:flex; align-items:center; gap:11px; padding:13px 0; border-bottom:1px solid var(--line);}
  .expRow:last-child{border-bottom:none;}
  .expName{font-weight:600; font-size:14px; color:var(--ink);}
  .expDate{font-size:11px; color:var(--muted); margin-top:2px;}
  .expNote{font-size:11px; color:var(--muted); margin-top:1px; font-style:italic;}
  .expAmt{margin-left:auto; font-weight:600; font-size:15px; color:var(--ink); font-family:'Sora';}
  .expDel{background:none; border:none; color:var(--red); cursor:pointer; font-size:15px; padding:4px 0 4px 8px;}
  .topCat{display:flex; align-items:center; gap:10px; background:var(--surface2); border:1px solid var(--line); border-radius:12px; padding:12px; margin-top:11px;}
  .topCatT{font-size:11px; color:var(--muted);}
  .topCatV{font-weight:600; font-size:14px; color:var(--ink); margin-top:2px;}
  /* pie */
  .pieWrap{display:flex; align-items:center; gap:16px; margin-top:4px;}
  .legend{flex:1; display:flex; flex-direction:column; gap:7px;}
  .lgRow{display:flex; align-items:center; gap:7px; font-size:11.5px;}
  .lgDot{width:9px; height:9px; border-radius:3px; flex-shrink:0;}
  .lgName{color:var(--ink); font-weight:500; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .lgPct{color:var(--muted); font-weight:600;}
  /* modal */
  .modalWrap{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:flex-end; justify-content:center; z-index:50;}
  .modalWrap.center{align-items:center; padding:24px;}
  .modalWrap.show{display:flex;}
  .modal{background:var(--surface); border-radius:22px 22px 0 0; padding:20px; padding-bottom:28px; width:100%; max-width:520px; max-height:88vh; overflow-y:auto;}
  .modalWrap.center .modal{border-radius:18px;}
  .modalTitle{font-family:'Sora'; font-weight:600; font-size:17px; color:var(--ink);}
  .chips{display:flex; gap:8px; overflow-x:auto; margin:12px 0; padding-bottom:2px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 11px; border-radius:12px; border:1.5px solid var(--line); background:none; cursor:pointer; min-width:64px;}
  .chip.on{border-color:var(--pri); background:var(--surface2);}
  .chip .ce{font-size:20px;}
  .chip .ct{font-size:10.5px; font-weight:500; color:var(--muted); white-space:nowrap;}
  .chip.on .ct{color:var(--pri);}
  .fLabel{font-size:12px; font-weight:500; color:var(--muted); margin-top:12px; margin-bottom:5px; display:block;}
  .fInput{width:100%; background:var(--surface2); border:1px solid var(--line); border-radius:10px; color:var(--ink); font-family:'Inter'; font-weight:500; font-size:14px; padding:11px 12px; outline:none;}
  .fInput:focus{border-color:var(--pri);}
  .modalBtns{display:flex; gap:10px; margin-top:18px;}
  .cancelBtn{flex:1; text-align:center; padding:13px; border-radius:12px; background:var(--surface2); border:none; color:var(--muted); font-weight:600; font-size:14px; cursor:pointer;}
  .saveBtn{flex:1; text-align:center; padding:13px; border-radius:12px; background:var(--pri); border:none; color:#fff; font-weight:600; font-size:14px; cursor:pointer;}
  .hint{font-size:11px; color:var(--muted); margin-top:8px; line-height:15px;}
  .grp{font-size:12px; font-weight:500; color:var(--muted); margin-top:16px; margin-bottom:6px;}
  .segRow{display:flex; gap:8px;}
  .seg{flex:1; border:1.5px solid var(--line); border-radius:10px; padding:10px 0; text-align:center; font-weight:600; font-size:13px; color:var(--muted); background:none; cursor:pointer;}
  .seg.on{border-color:var(--pri); background:var(--surface2); color:var(--pri);}
  .skipGrid{display:flex; flex-wrap:wrap; gap:9px; margin-top:14px;}
  .skipOpt{flex-grow:1; min-width:45%; text-align:center; padding:13px 0; border-radius:11px; border:1.5px solid var(--line); background:none; font-weight:600; font-size:13px; color:var(--ink); cursor:pointer;}
  .installTip{background:var(--surface2); border:1px solid var(--line); border-radius:12px; padding:12px; margin-top:12px; font-size:11.5px; color:var(--muted); line-height:16px;}
  /* sync */
  .codeBox{background:var(--surface2); border:2px dashed var(--pri); border-radius:12px; padding:16px; text-align:center; margin-top:10px;}
  .codeVal{font-family:'Sora'; font-weight:700; font-size:26px; color:var(--pri); letter-spacing:2px;}
  .codeHint{font-size:11px; color:var(--muted); margin-top:5px;}
  .syncStatus{display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--muted); margin-top:10px;}
  .toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--bg); padding:10px 18px; border-radius:20px; font-size:12.5px; font-weight:600; z-index:99; opacity:0; transition:opacity .2s; pointer-events:none;}
  .toast.show{opacity:1;}
  .stepVal.ghost{color:var(--muted); opacity:.65;}
  .pendPill{font-size:9.5px; font-weight:600; color:var(--amber); border:1px solid var(--amber); border-radius:20px; padding:2px 7px; white-space:nowrap;}
  .okBtn{padding:8px 14px; border-radius:9px; border:1.5px solid var(--pri); background:none; color:var(--pri); font-size:12px; font-weight:600; cursor:pointer;}
  .rowBtns{display:flex; gap:8px; margin-top:10px;}
  .miniBtn{flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px; border-radius:9px; border:1px solid var(--line); background:none; color:var(--red); font-size:11.5px; font-weight:600; cursor:pointer;}
  .miniBtn.miniOn{background:var(--red); border-color:var(--red); color:#fff;}
  .miniBtn.miniBlue{color:var(--pri);}
  .confirmBtn{margin-top:10px; width:100%; padding:10px; border-radius:9px; border:none; background:var(--pri); color:#fff; font-weight:600; font-size:12.5px; cursor:pointer;}
  /* recurring */
  .recRow{display:flex; align-items:center; gap:11px; padding:12px 0; border-bottom:1px solid var(--line);}
  .recRow:last-child{border-bottom:none;}
  .recName{font-weight:600; font-size:14px; color:var(--ink);}
  .recMeta{font-size:11px; color:var(--muted); margin-top:2px;}
  .recAmt{margin-left:auto; text-align:right;}
  .recAmtV{font-family:'Sora'; font-weight:600; font-size:14px; color:var(--ink);}
  .recNext{font-size:10px; color:var(--muted); margin-top:2px;}
  .recActs{display:flex; gap:6px; margin-left:8px;}
  .recBtn{background:none; border:1px solid var(--line); border-radius:8px; padding:5px 8px; font-size:11px; cursor:pointer; color:var(--muted);}
  .recPaused{opacity:.5;}
  .dueBanner{background:var(--surface2); border:1.5px solid var(--amber); border-radius:12px; padding:12px; margin-bottom:11px;}
  .dueT{font-weight:600; font-size:13px; color:var(--ink);}
  .dueS{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:16px;}
  .dueBtn{margin-top:9px; width:100%; padding:10px; border-radius:9px; border:none; background:var(--amber); color:#fff; font-weight:600; font-size:12.5px; cursor:pointer;}
  .pdfBtn{display:flex; align-items:center; justify-content:center; gap:8px; border:1.5px solid var(--line); border-radius:12px; padding:13px; margin-top:11px; background:none; color:var(--ink); font-size:14px; font-weight:600; cursor:pointer; width:100%;}

  /* attendance calendar */
  .calWrap{margin-top:12px;}
  .calHead{display:flex; align-items:center; justify-content:space-between; margin-bottom:9px;}
  .calMon{font-weight:600; font-size:13px; color:var(--ink);}
  .calNav{background:none; border:1px solid var(--line); border-radius:8px; width:30px; height:28px; color:var(--muted); cursor:pointer; font-size:14px;}
  .calNav:disabled{opacity:.35;}
  .calDow{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:4px;}
  .calDow span{text-align:center; font-size:9.5px; font-weight:600; color:var(--muted);}
  .calGrid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .calCell{aspect-ratio:1; border-radius:8px; border:1px solid var(--line); background:var(--surface2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; padding:0;}
  .calCell.blank{border:none; background:none; cursor:default;}
  .calCell.future{opacity:.32; cursor:default;}
  .calCell.today{border-color:var(--pri); border-width:2px;}
  .calDnum{font-size:10.5px; font-weight:600; color:var(--ink); line-height:1;}
  .calDot{width:6px; height:6px; border-radius:50%; background:transparent;}
  .calDot.P{background:var(--green);} .calDot.H{background:var(--amber);} .calDot.A{background:var(--red);}
  .calLegend{display:flex; gap:12px; justify-content:center; margin-top:10px; flex-wrap:wrap;}
  .calLg{display:flex; align-items:center; gap:5px; font-size:10.5px; color:var(--muted);}
  .calStat{display:flex; gap:7px; margin-top:11px;}
  .calStatI{flex:1; background:var(--surface2); border-radius:9px; padding:8px; text-align:center;}
  .calStatN{font-family:'Sora'; font-weight:700; font-size:15px; color:var(--ink);}
  .calStatL{font-size:9.5px; color:var(--muted); margin-top:1px;}
  .calBtn{display:flex; align-items:center; justify-content:center; gap:6px; margin-top:11px; padding:10px; border-radius:10px; border:1px solid var(--line); background:none; color:var(--pri); font-size:12.5px; font-weight:600; cursor:pointer; width:100%;}

</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="brandRow">
      <div class="mark">🏠</div>
      <div class="brand">GharKhata</div>
      <div class="syncDot off" id="syncDot"></div>
      <button class="gear" onclick="openSettings()">⚙️</button>
    </div>
    <div class="tagline" id="tagline"></div>
  </div>
  <div class="body" id="body"></div>
  <div class="tabbar" id="tabbar"></div>
</div>
<div class="modalWrap" id="modalWrap"><div class="modal" id="modalHost"></div></div>
<div class="toast" id="toast"></div>

function setLang(l){ if(!STRINGS[l]) return; DB.set('gk.lang',l); applyLangFont(); render(); openSettings(); }
function t(key,vars){
  const L=getLang();
  let s=(STRINGS[L]&&STRINGS[L][key])||STRINGS.en[key]||key;
  if(vars) for(const k of Object.keys(vars)) s=s.split('{'+k+'}').join(String(vars[k]));
  return s;
}
// Our display font has no Indic glyphs — swap to a script-capable stack for non-English.

  const L=getLang();
  document.body.style.fontFamily = L==='en'

    : "'Noto Sans','Noto Sans Devanagari','Noto Sans Gujarati','Noto Sans Tamil','Noto Sans Bengali','Noto Sans Kannada','Noto Sans Telugu',sans-serif";

}

  if(d.staff)DB.set('gk.staff',d.staff); if(d.att)DB.set('gk.att',d.att);
  if(d.advances)DB.set('gk.advances',d.advances); if(d.expenses)DB.set('gk.expenses',d.expenses);
  if(d.recurring)DB.set('gk.recurring',d.recurring);
}

let syncing=false, pushTimer=null, channel=null, applyingRemote=false;
function setSyncDot(on){ document.getElementById('syncDot').className='syncDot'+(on?'':' off'); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; setTimeout(()=>t.className='toast',1800); }
function genCode(){ const A='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<8;i++) c+=A[Math.floor(Math.random()*A.length)]; return c; }

function pushSync(){
  if(!sb||!S.code()||applyingRemote) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    try{ await sb.from('households').upsert({code:S.code(),data:snapshot(),updated_at:new Date().toISOString()}); }catch(e){}
  },600);
}
async function pullOnce(){
  if(!sb||!S.code()) return;
  try{
    const {data,error}=await sb.from('households').select('data').eq('code',S.code()).maybeSingle();
    if(!error&&data&&data.data){ applyingRemote=true; applySnapshot(data.data); applyingRemote=false; render(); }
  }catch(e){}
}
async function connectSync(code, isNew){
  if(!sb){ toast('Sync not configured'); return false; }
  code=code.trim().toUpperCase();
  if(code.length<4){ toast('Code too short'); return false; }
  try{
    const {data}=await sb.from('households').select('data').eq('code',code).maybeSingle();
    if(data&&data.data&&Object.keys(data.data).length){
      // existing household: pull their data down
      if(!isNew && !confirm('This code already has data. Load it? Your current data on this device will be replaced.')) return false;
      applyingRemote=true; applySnapshot(data.data); applyingRemote=false;
    } else {
      // new household: push our data up
      await sb.from('households').upsert({code,data:snapshot(),updated_at:new Date().toISOString()});
    }
    S.setCode(code);
    startRealtime();
    setSyncDot(true); render(); toast('Sync on · '+code);
    return true;
  }catch(e){ toast('Could not connect'); return false; }
}
function startRealtime(){
  if(!sb||!S.code()) return;
  if(channel){ try{ sb.removeChannel(channel); }catch(e){} }
  channel=sb.channel('gk-'+S.code())
    .on('postgres_changes',{event:'*',schema:'public',table:'households',filter:'code=eq.'+S.code()},(p)=>{
      if(p.new&&p.new.data){ applyingRemote=true; applySnapshot(p.new.data); applyingRemote=false; render(); }
    }).subscribe();
}
function disconnectSync(){
  if(channel&&sb){ try{ sb.removeChannel(channel); }catch(e){} channel=null; }
  S.setCode(null); setSyncDot(false); toast('Sync off — data stays on this device');
}

// ============ CALC ============
function fmt(num){ let n=Math.round(num||0); const neg=n<0; n=Math.abs(n); let s=String(n);
  if(s.length<=3) return (neg?'-':'')+s;
  return (neg?'-':'')+s.slice(0,-3).replace(/\B(?=(\d{2})+(?!\d))/g,',')+','+s.slice(-3); }
const todayKey=()=>{ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const monthOf=(k)=>k.slice(0,7); const yearOf=(k)=>k.slice(0,4);
function daysBetween(f,t){ const out=[]; const d=new Date(f+'T00:00:00'); const e=new Date(t+'T00:00:00');
  while(d<e){ d.setDate(d.getDate()+1); out.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')); } return out; }
function vendorTotals(vendors,entries,period){ const totals={}; let grand=0;
  for(const [day,m] of Object.entries(entries)){ if(!day.startsWith(period)) continue;
    for(const v of vendors){ const q=m[v.id]; if(!q) continue; const amt=q*v.rate; totals[v.id]=(totals[v.id]||0)+amt; grand+=amt; } }
  return {totals,grand}; }
function staffSalary(st,att,advances,period){ const isMonth=period.length===7; let lv=0;
  for(const [day,m] of Object.entries(att)){ if(!day.startsWith(period)) continue; const v=m[st.id];
    if(v==='A') lv+=1; else if(v==='H') lv+=0.5; }
  const months=isMonth?1:12; const allowed=st.paidLeaves*months; const unpaid=Math.max(0,lv-allowed);
  const deduction=Math.round(unpaid*(st.salary/30));
  const adv=advances.filter(a=>a.staffId===st.id&&a.date.startsWith(period)).reduce((s,a)=>s+a.amount,0);
  const base=st.salary*(isMonth?1:12); return {base,leaveUnits:lv,unpaid,deduction,adv,net:base-deduction-adv}; }
function expInPeriod(expenses,period){ return expenses.filter(e=>e.date.startsWith(period)); }
function expByCat(expenses,period){
  const by={}; expInPeriod(expenses,period).forEach(e=>{ by[e.cat]=(by[e.cat]||0)+e.amount; }); return by; }

// Auto-fill: fills your usual quantities for any day not entered yet (never
// overwrites what you typed). On Android/Chrome the app can also nudge you at
// 12 PM; iOS Safari doesn't allow web notifications, so there the fill simply
// happens quietly whenever the app is opened.
function runAutoFill(){
  const st=S.settings(); if(st.autoFill===false) return;
  const today=todayKey(); const last=DB.get('gk.lastFill',null);
  const vendors=S.vendors();
  if(!vendors.length) return;                       // nothing to fill — do NOT mark the day done
  const entries=DB.get('gk.entries',{});
  // Back-fill missed days, and ALWAYS consider today (so adding a vendor later still works).
  const days = last ? daysBetween(last,today) : [];
  if(!days.includes(today)) days.push(today);
  const now=new Date(); const pastNinePM = now.getHours() >= 21;
  let changed=false, filledToday=false;
  for(const day of days){
    // Today is only auto-filled after 9 PM — before that you still get to enter it
    // yourself (and the "Confirm" button is right there).
    if(day===today && !pastNinePM) continue;
    if(!entries[day]) entries[day]={};
    for(const v of vendors){
      if(v.skipUntil&&day<=v.skipUntil) continue;
      if(entries[day][v.id]!=null) continue;
      entries[day][v.id]=v.def; changed=true;
      if(day===today) filledToday=true;
    }
  }
  if(changed) S.setEntries(entries);
  // Only mark the day complete once today itself has actually been handled.
  if(pastNinePM) DB.set('gk.lastFill',today);
  else if(last && last!==today) DB.set('gk.lastFill', yesterdayOf(today));
  if(filledToday) try{ new Notification('Auto-filled today’s entries ✅',{body:'Your usual quantities were added. Tap to review.',icon:'icon-192.png'}); }catch(e){}
}
function yesterdayOf(k){ const d=new Date(k+'T00:00:00'); d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// 12 PM reminder — works on Android/Chrome (installed PWA). iOS Safari has no
// web notifications at all, so this is a no-op there (by Apple's design).
function scheduleWebReminder(){
  const st=S.settings(); if(st.reminder===false) return;
  if(!('Notification' in window)) return;
  const fire=()=>{
    const stamp=DB.get('gk.lastNudge',null); const today=todayKey();
    if(stamp===today) return;
    const now=new Date();
    if(now.getHours()<12) return;             // only from noon onwards
    DB.set('gk.lastNudge',today);
    try{ new Notification("Today's entries 📝",{ body:'Milk, staff attendance, anything else? Takes 30 seconds.', icon:'icon-192.png' }); }catch(e){}
  };
  if(Notification.permission==='granted') fire();
  else if(Notification.permission!=='denied'){ Notification.requestPermission().then(p=>{ if(p==='granted') fire(); }); }
}

function renderVendors(){
  setTagline(t('v.subtitle'));
  const today=todayKey(); const vendors=S.vendors(); const entries=S.entries();
  const tq=(id)=>{ const e=entries[today]; return e&&e[id]!=null?e[id]:null; };
  const paused=(v)=>v.skipUntil&&today<=v.skipUntil;

  const active=vendors.filter(v=>!paused(v));
  let total=0, pending=0, ifAccepted=0;
  active.forEach(v=>{ const q=tq(v.id);
    if(q!=null) total+=q*v.rate;
    else { pending++; ifAccepted+=v.def*v.rate; } });

  let h=`<div class="totCard"><div class="totLabel">${t('v.todayTotal')}</div>
    <div class="totVal">₹${fmt(total)}</div>`;
  if(!vendors.length){
    h+=`<div class="totSub">${t('v.addFirst')}</div>`;
  } else if(pending){
    h+=`<div class="totSub">${t('v.pending',{n:pending,t:active.length})} · ${t('v.ifAccept',{a:fmt(total+ifAccepted)})}</div>
        <button class="confirmBtn" onclick="confirmDefaults()">✓ ${t('v.confirmAll')}</button>`;
  } else {
    h+=`<div class="totSub">${t('v.allEntered',{n:active.length})}</div>`;
  }
  h+=`</div>`;

  vendors.forEach(v=>{
    const q=tq(v.id); const p=paused(v); const entered=q!=null; const shown=entered?q:v.def;
    const label=shown===0?t('v.skip'):`${shown%1===0?shown:shown.toFixed(1)} ${t(v.unit)}`;
    h+=`<div class="card"><div class="cardTop"><div class="emoji">${v.emoji}</div>
      <div style="flex:1"><div class="vName">${esc(v.name)}</div>
      <div class="vMeta">₹${v.rate}/${t(v.unit)}${entered&&!p?' · ₹'+fmt(q*v.rate):''}</div></div>
      ${!p&&!entered?`<span class="pendPill">${t('v.notEntered')}</span>`:''}
      <button class="dots" onclick="removeVendor('${v.id}')">⋮</button></div>`;
    if(p){ h+=`<button class="pausedRow" onclick="clearSkip('${v.id}')">⏸ ${t('v.pausedTill',{d:v.skipUntil})}</button>`; }
    else{ h+=`<div class="stepRow"><div class="stepper">
      <button class="stepBtn" onclick="stepVendor('${v.id}',${v.frac?-0.5:-1})">−</button>
      <span class="stepVal ${shown===0?'zero':''} ${entered?'':'ghost'}">${label}</span>
      ${v.frac?`<button class="stepBtn halfBtn" onclick="stepVendor('${v.id}',0.5)">+½</button>`:''}
      <button class="stepBtn" onclick="stepVendor('${v.id}',1)">+</button></div>
      ${entered?`<button class="skipBtn" onclick="openSkip('${v.id}')">${t('v.skipDays')}</button>`
                :`<button class="okBtn" onclick="acceptDefault('${v.id}')">✓ ${t('v.ok')}</button>`}</div>
      <div class="rowBtns">
        <button class="miniBtn ${q===0?'miniOn':''}" onclick="toggleCame('${v.id}')">✕ ${t('v.didntCome')}</button>
        <button class="miniBtn miniBlue" onclick="openVCal('${v.id}')">📅 ${t('v.calendar')}</button>
      </div>`; }
    h+=`</div>`;
  });
  h+=`<button class="addBtn" onclick="openAddVendor()">＋ ${t('v.addVendor')}</button>`;
  h+=`<div class="hint" style="text-align:center;margin-top:12px">${t('v.ghostHint')}</div>`;
  $('body').innerHTML=h;
}

// Accept ALL pending vendors at once.
function confirmDefaults(){
  const today=todayKey(); const entries=S.entries(); const day={...(entries[today]||{})};
  S.vendors().forEach(v=>{
    if(v.skipUntil&&today<=v.skipUntil) return;
    if(day[v.id]==null) day[v.id]=v.def;
  });
  entries[today]=day; S.setEntries(entries); renderVendors(); toast('Today confirmed');
}

  entries[today]={...(entries[today]||{}),[id]:nv}; S.setEntries(entries); renderVendors();
}

function toggleCame(id){
  const v=S.vendors().find(x=>x.id===id); const today=todayKey(); const entries=S.entries();
  const cur=(entries[today]&&entries[today][id]!=null)?entries[today][id]:null;
  const next = cur===0 ? v.def : 0;     // tap again to undo
  entries[today]={...(entries[today]||{}),[id]:next};
  S.setEntries(entries); renderVendors();
}

let vcalId=null, vcalYM=null;
function openVCal(id){ vcalId=id; vcalYM=monthOf(todayKey()); renderVCal(); }
function vcalMove(d){ vcalYM=shiftYM(vcalYM,d); renderVCal(); }

function renderVCal(){
  const v=S.vendors().find(x=>x.id===vcalId); if(!v) return;
  const entries=S.entries(); const [y,m]=vcalYM.split('-').map(Number);
  const startDow=new Date(y,m-1,1).getDay(); const days=new Date(y,m,0).getDate();
  const today=todayKey(); const curYM=monthOf(today);

  let cells='', came=0, missed=0, qtySum=0, amount=0;
  for(let i=0;i<startDow;i++) cells+='<button class="calCell blank"></button>';
  for(let d=1;d<=days;d++){
    const key=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const q=(entries[key]&&entries[key][v.id]!=null)?entries[key][v.id]:null;
    if(q!=null){ if(q>0){ came++; qtySum+=q; amount+=q*v.rate; } else missed++; }
    const future=key>today;
    const cls=['calCell']; if(future)cls.push('future'); if(key===today)cls.push('today');
    const dot = q==null ? '' : (q>0 ? 'P' : 'A');   // reuse green/red dot classes
    cells+=`<button class="${cls.join(' ')}" ${future?'disabled':`onclick="cycleVCal('${key}')"`}>
      <span class="calDnum">${d}</span><span class="calDot ${dot}"></span></button>`;
  }

  showModal(`<div class="modalTitle">${v.emoji} ${esc(v.name)} — ${t('v.attendance')}</div>
    <div class="calWrap">
      <div class="calHead">
        <button class="calNav" onclick="vcalMove(-1)">‹</button>
        <span class="calMon">${MONTHS[m-1]} ${y}</span>
        <button class="calNav" onclick="vcalMove(1)" ${vcalYM>=curYM?'disabled':''}>›</button>
      </div>
      <div class="calDow">${DOW.map(d=>`<span>${d}</span>`).join('')}</div>
      <div class="calGrid">${cells}</div>
      <div class="calLegend">
        <span class="calLg"><span class="calDot P"></span>${t('v.came')}</span>
        <span class="calLg"><span class="calDot A"></span>${t('v.didntCome')}</span>
        <span class="calLg"><span class="calDot"></span>${t('v.notMarked')}</span>
      </div>
      <div class="calStat">
        <div class="calStatI"><div class="calStatN" style="color:var(--green)">${came}</div><div class="calStatL">${t('v.came')}</div></div>
        <div class="calStatI"><div class="calStatN" style="color:var(--red)">${missed}</div><div class="calStatL">${t('v.missed')}</div></div>
        <div class="calStatI"><div class="calStatN">${Math.round(qtySum*10)/10}</div><div class="calStatL">${t(v.unit)}</div></div>
        <div class="calStatI"><div class="calStatN" style="color:var(--pri)">₹${fmt(amount)}</div><div class="calStatL">${t('v.thisMonth')}</div></div>
      </div>
      <div class="hint">Tap a past day: not marked → came (${v.def} ${v.unit}) → didn't come → not marked.
      For an unusual quantity on a day, use the −/+ stepper on the Vendors tab.</div>
    </div>
    <div class="modalBtns"><button class="saveBtn" onclick="closeModal(); renderVendors();">${t('st.done')}</button></div>`);
}
function cycleVCal(key){
  const v=S.vendors().find(x=>x.id===vcalId); const entries=S.entries();
  const cur=(entries[key]&&entries[key][v.id]!=null)?entries[key][v.id]:null;
  const day={...(entries[key]||{})};
  if(cur==null) day[v.id]=v.def;        // not marked -> came
  else if(cur>0) day[v.id]=0;           // came -> didn't come
  else delete day[v.id];                // didn't come -> not marked
  entries[key]=day; S.setEntries(entries); renderVCal();
}

// ============ ATTENDANCE CALENDAR ============
let calStaffId=null, calYM=null; // calYM = 'YYYY-MM'
const DOW=['S','M','T','W','T','F','S'];
function ymOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function shiftYM(ym,delta){
  const [y,m]=ym.split('-').map(Number);
  const d=new Date(y,m-1+delta,1); return ymOf(d);
}
function openCal(id){ calStaffId=id; calYM=monthOf(todayKey()); renderCal(); }
function calMove(delta){ calYM=shiftYM(calYM,delta); renderCal(); }

function renderCal(){
  const st=S.staff().find(x=>x.id===calStaffId); if(!st) return;
  const att=S.att(); const [y,m]=calYM.split('-').map(Number);
  const first=new Date(y,m-1,1); const startDow=first.getDay();
  const days=new Date(y,m,0).getDate();
  const today=todayKey(); const curYM=monthOf(today);
  const label=MONTHS[m-1]+' '+y;

  let cells='';
  for(let i=0;i<startDow;i++) cells+='<button class="calCell blank"></button>';
  let P=0,H=0,A=0;
  for(let d=1;d<=days;d++){
    const key=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const mk=(att[key]&&att[key][st.id])||'';
    if(mk==='P')P++; else if(mk==='H')H++; else if(mk==='A')A++;
    const future=key>today;
    const cls=['calCell']; if(future)cls.push('future'); if(key===today)cls.push('today');
    cells+=`<button class="${cls.join(' ')}" ${future?'disabled':`onclick="cycleCal('${key}')"`}>
      <span class="calDnum">${d}</span><span class="calDot ${mk}"></span></button>`;
  }
  const unpaid=Math.max(0,(A+H*0.5)-st.paidLeaves);
  const ded=Math.round(unpaid*(st.salary/30));

  showModal(`<div class="modalTitle">${esc(st.name)} — ${t('v.attendance')}</div>
    <div class="calWrap">
      <div class="calHead">
        <button class="calNav" onclick="calMove(-1)">‹</button>
        <span class="calMon">${label}</span>
        <button class="calNav" onclick="calMove(1)" ${calYM>=curYM?'disabled':''}>›</button>
      </div>
      <div class="calDow">${DOW.map(d=>`<span>${d}</span>`).join('')}</div>
      <div class="calGrid">${cells}</div>
      <div class="calLegend">
        <span class="calLg"><span class="calDot P"></span>${t('s.present')}</span>
        <span class="calLg"><span class="calDot H"></span>${t('s.half')}</span>
        <span class="calLg"><span class="calDot A"></span>${t('s.absent')}</span>
        <span class="calLg"><span class="calDot"></span>${t('v.notMarked')}</span>
      </div>
      <div class="calStat">
        <div class="calStatI"><div class="calStatN" style="color:var(--green)">${P}</div><div class="calStatL">${t('s.present')}</div></div>
        <div class="calStatI"><div class="calStatN" style="color:var(--amber)">${H}</div><div class="calStatL">${t('s.half')}</div></div>
        <div class="calStatI"><div class="calStatN" style="color:var(--red)">${A}</div><div class="calStatL">${t('s.absent')}</div></div>
        <div class="calStatI"><div class="calStatN">${ded>0?'−₹'+fmt(ded):'₹0'}</div><div class="calStatL">${t('s.deduction')}</div></div>
      </div>
      <div class="hint">Tap any past day to change it: Present → Half → Absent → clear.
      ${st.paidLeaves} paid leave${st.paidLeaves===1?'':'s'}/month; anything beyond that is deducted at ₹${fmt(Math.round(st.salary/30))}/day.</div>
    </div>
    <div class="modalBtns"><button class="saveBtn" onclick="closeModal(); renderStaff();">${t('st.done')}</button></div>`);
}
function cycleCal(key){
  const att=S.att(); const cur=(att[key]&&att[key][calStaffId])||'';
  const next={'':'P','P':'H','H':'A','A':''}[cur];
  const day={...(att[key]||{})};
  if(next) day[calStaffId]=next; else delete day[calStaffId];
  att[key]=day; S.setAtt(att); renderCal();
}

// ============ PIE ============
function pieSVG(slices,size){
  size=size||130; const r=size/2, ir=r*0.58; const total=slices.reduce((s,x)=>s+x.value,0);
  if(!total) return '';
  let a0=-Math.PI/2, paths='';
  slices.forEach(s=>{
    const a1=a0+(s.value/total)*Math.PI*2;
    const big=(a1-a0)>Math.PI?1:0;
    const x0=r+r*Math.cos(a0), y0=r+r*Math.sin(a0), x1=r+r*Math.cos(a1), y1=r+r*Math.sin(a1);
    const xi1=r+ir*Math.cos(a1), yi1=r+ir*Math.sin(a1), xi0=r+ir*Math.cos(a0), yi0=r+ir*Math.sin(a0);
    paths+=`<path d="M${x0} ${y0} A${r} ${r} 0 ${big} 1 ${x1} ${y1} L${xi1} ${yi1} A${ir} ${ir} 0 ${big} 0 ${xi0} ${yi0} Z" fill="${s.color}"/>`;
    a0=a1;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">${paths}</svg>`;
}

  const by=expByCat(expenses,period); const eGrand=Object.values(by).reduce((s,v)=>s+v,0);

// Parses text shared from Zomato/Blinkit/Amazon etc. and prefills the expense form.
function parseShared(text){
  if(!text) return null;
  const t=text.toLowerCase();
  // amount: first ₹/Rs/INR number, else biggest number that looks like money
  let amount=null;
  const m=text.match(/(?:₹|rs\.?|inr)\s*([\d,]+(?:\.\d{1,2})?)/i);
  if(m) amount=parseFloat(m[1].replace(/,/g,''));
  if(!amount){ const nums=(text.match(/\b\d{2,6}(?:\.\d{1,2})?\b/g)||[]).map(Number); if(nums.length) amount=Math.max(...nums); }
  const brands=[
    ['blinkit','eatingin','Blinkit'],['zepto','eatingin','Zepto'],['instamart','eatingin','Swiggy Instamart'],
    ['bigbasket','groceries','BigBasket'],['dmart','groceries','DMart'],
    ['zomato','eatingout','Zomato'],['swiggy','eatingout','Swiggy'],
    ['amazon','shopping','Amazon'],['flipkart','shopping','Flipkart'],['myntra','shopping','Myntra'],
    ['uber','travel','Uber'],['ola','travel','Ola'],['rapido','travel','Rapido'],['irctc','travel','IRCTC'],
    ['bookmyshow','ent','BookMyShow'],['netflix','subs','Netflix'],['hotstar','subs','Hotstar'],
    ['spotify','subs','Spotify'],['groww','sip','Groww'],['zerodha','sip','Zerodha'],['lic','insurance','LIC'],
    ['indianoil','fuel','IndianOil'],['hp petrol','fuel','HP'],['bharat petroleum','fuel','BPCL'],
    ['pharmeasy','medical','PharmEasy'],['apollo','medical','Apollo'],['1mg','medical','Tata 1mg'],
  ];
  let cat='other', name='Expense', note=text.slice(0,80);
  for(const [key,c,label] of brands){ if(t.includes(key)){ cat=c; name=CAT(c).name; note=label; break; } }
  return {cat,name,note,amount:amount||''};
}
function handleShareTarget(){
  const p=new URLSearchParams(location.search);

// ============ RECURRING EXPENSES ============
const FREQS=[
  {f:'weekly',    name:'Weekly',    every:'week'},
  {f:'monthly',   name:'Monthly',   every:'month'},
  {f:'quarterly', name:'Quarterly', every:'3 months'},
  {f:'yearly',    name:'Yearly',    every:'year'},
];
const FREQ=(f)=>FREQS.find(x=>x.f===f)||FREQS[1];

function addPeriod(dateKey,freq){
  const [y,m,d]=dateKey.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  if(freq==='weekly') dt.setDate(dt.getDate()+7);
  else if(freq==='monthly') dt.setMonth(dt.getMonth()+1);
  else if(freq==='quarterly') dt.setMonth(dt.getMonth()+3);
  else if(freq==='yearly') dt.setFullYear(dt.getFullYear()+1);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

// On open: post any recurring items that are due.
// fixed  -> creates the expense automatically
// variable -> queued in `pendingRecurring` so the user types the amount
let pendingRecurring=[];
function runRecurring(){
  const recs=S.recurring(); if(!recs.length) return;
  const today=todayKey(); const expenses=S.expenses();
  let changed=false; pendingRecurring=[];
  recs.forEach(r=>{
    if(!r.active) return;
    let guard=0;
    while(r.nextDue<=today && guard++<60){
      if(r.variable){ pendingRecurring.push({recId:r.id,due:r.nextDue}); break; } // wait for user
      expenses.push({id:uid(),name:r.name,note:r.note||'',amount:r.amount,date:r.nextDue,cat:r.cat,rec:r.id});
      r.nextDue=addPeriod(r.nextDue,r.freq); changed=true;
    }
  });
  if(changed){ S.setExpenses(expenses); }
  S.setRecurring(recs);
}
function confirmVariable(recId,amount){
  const recs=S.recurring(); const r=recs.find(x=>x.id===recId); if(!r) return;
  const expenses=S.expenses();
  expenses.push({id:uid(),name:r.name,note:r.note||'',amount,date:r.nextDue,cat:r.cat,rec:r.id});
  r.nextDue=addPeriod(r.nextDue,r.freq);
  S.setExpenses(expenses); S.setRecurring(recs);
  runRecurring(); renderExpenses();
}
function skipOccurrence(recId){
  const recs=S.recurring(); const r=recs.find(x=>x.id===recId); if(!r) return;
  r.nextDue=addPeriod(r.nextDue,r.freq); S.setRecurring(recs);
  runRecurring(); renderExpenses(); toast('Skipped this time');
}
function togglePause(recId){
  const recs=S.recurring(); const r=recs.find(x=>x.id===recId); if(!r) return;
  r.active=!r.active; S.setRecurring(recs);
  if(r.active) runRecurring();
  renderExpenses(); toast(r.active?'Resumed':'Paused');
}

  S.setRecurring(S.recurring().filter(r=>r.id!==recId)); runRecurring(); renderExpenses();

function buildReportRows(period){
  const vendors=S.vendors(),entries=S.entries(),staff=S.staff(),att=S.att(),adv=S.advances(),expenses=S.expenses();
  const {totals:vTot,grand:vGrand}=vendorTotals(vendors,entries,period);
  const sRows=staff.map(st=>({st,sal:staffSalary(st,att,adv,period)}));
  const sGrand=sRows.reduce((s,r)=>s+r.sal.net,0);
  const by=expByCat(expenses,period); const eGrand=Object.values(by).reduce((s,v)=>s+v,0);
  return {vendors,vTot,vGrand,sRows,sGrand,by,eGrand,expenses:expInPeriod(expenses,period),grand:vGrand+sGrand+eGrand};
}

  doc.text(`Household report — ${pLabel}`,14,20);
  doc.setTextColor(34,49,74);
  doc.setFontSize(22); doc.setFont(undefined,'bold');
  doc.text(`${RS}${fmt(R.grand)}`,14,40);
  doc.setFontSize(9); doc.setFont(undefined,'normal'); doc.setTextColor(124,136,153);
  doc.text(`Vendors ${RS}${fmt(R.vGrand)}  |  Staff ${RS}${fmt(R.sGrand)}  |  Expenses ${RS}${fmt(R.eGrand)}`,14,46);
  let y=56;

  if(R.vGrand>0){
    doc.autoTable({startY:y, head:[['Vendor','Total']],
      body:R.vendors.filter(v=>R.vTot[v.id]).map(v=>[v.name, RS+fmt(R.vTot[v.id])]),
      theme:'striped', headStyles:{fillColor:[45,92,143]}, styles:{fontSize:9},
      columnStyles:{1:{halign:'right'}}});
    y=doc.lastAutoTable.finalY+8;
  }
  if(R.sGrand>0){
    doc.autoTable({startY:y, head:[['Staff','Base','Leave','Advance','Net']],
      body:R.sRows.map(r=>[r.st.name, RS+fmt(r.sal.base), r.sal.deduction?'-'+RS+fmt(r.sal.deduction):'-', r.sal.adv?'-'+RS+fmt(r.sal.adv):'-', RS+fmt(r.sal.net)]),
      theme:'striped', headStyles:{fillColor:[17,138,178]}, styles:{fontSize:9},
      columnStyles:{1:{halign:'right'},2:{halign:'right'},3:{halign:'right'},4:{halign:'right'}}});
    y=doc.lastAutoTable.finalY+8;
  }
  if(R.eGrand>0){
    doc.autoTable({startY:y, head:[['Category','Amount','Share']],
      body:Object.entries(R.by).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[CAT(k).name, RS+fmt(v), Math.round(v/R.eGrand*100)+'%']),
      theme:'striped', headStyles:{fillColor:[232,121,74]}, styles:{fontSize:9},
      columnStyles:{1:{halign:'right'},2:{halign:'right'}}});
    y=doc.lastAutoTable.finalY+8;

    if(y>250){ doc.addPage(); y=18; }
    doc.autoTable({startY:y, head:[['Date','Expense','Category','Details','Amount']],
      body:R.expenses.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
        const d=new Date(e.date+'T00:00:00');
        return [`${d.getDate()} ${MONTHS[d.getMonth()]}`, e.name, CAT(e.cat).name, e.note||'-', RS+fmt(e.amount)];
      }),
      theme:'grid', headStyles:{fillColor:[124,136,153]}, styles:{fontSize:8},
      columnStyles:{4:{halign:'right'}}});
  }
  const n=doc.internal.getNumberOfPages();
  for(let i=1;i<=n;i++){ doc.setPage(i); doc.setFontSize(8); doc.setTextColor(150);
    doc.text(`Generated by GharKhata · ${new Date().toLocaleDateString('en-IN')}`,14,290);
    doc.text(`${i} / ${n}`,196,290,{align:'right'}); }
  doc.save(`GharKhata-${pLabel.replace(' ','-')}.pdf`);
  toast('PDF downloaded');
}

// ============ ROUTER + INIT ============
function render(){
  if(tab==='vendors') renderVendors();
  else if(tab==='staff') renderStaff();
  else if(tab==='expenses') renderExpenses();
  else if(tab==='summary') renderSummary();
}
applyTheme();
applyLangFont();
if(window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',applyTheme);
runAutoFill();
scheduleWebReminder();
runRecurring();
renderTabs();
render();
if(S.code()&&sb){ setSyncDot(true); startRealtime(); pullOnce(); }
handleShareTarget();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) pullOnce(); });
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
</body>
</html>
